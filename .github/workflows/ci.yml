name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go test ./... -race

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on every commit
        run: |
          set -e
          missing=0
          for sha in $(git rev-list origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by: '; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer (run 'git commit -s')"
              missing=1
            fi
          done
          exit $missing
