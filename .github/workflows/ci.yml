name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - run: go build ./...
      - run: go test ./... -race

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: "1.26"
          go-package: ./...

  dco:
    runs-on: ubuntu-latest
    # Dependabot's own commits never carry a Signed-off-by trailer and a
    # bot can't meaningfully DCO-sign off in the legal sense the trailer
    # implies, so its PRs are exempt — same as other bots are commonly
    # allowlisted from this check elsewhere.
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check DCO sign-off on every commit
        run: |
          set -e
          missing=0
          for sha in $(git rev-list origin/${{ github.base_ref }}..HEAD); do
            if ! git log -1 --format='%B' "$sha" | grep -q '^Signed-off-by: '; then
              echo "::error::Commit $sha is missing a Signed-off-by trailer (run 'git commit -s')"
              missing=1
            fi
          done
          exit $missing
