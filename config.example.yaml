# Example tallyd configuration. Copy to config.yaml and adjust for your
# environment.
listen:
  http: "127.0.0.1:8999"
  # grpc: "127.0.0.1:9000"  # uncomment to also accept events over gRPC;
                            # leave unset/empty to disable it entirely

buffer:
  dir: ./data/wal
  max_bytes: 2147483648 # 2GiB; new events are rejected (503) once the WAL exceeds this
  on_full: reject # only supported value so far

# "stdout" prints batches instead of calling a real billing API, so the
# whole pipeline can be exercised without vendor credentials. "metronome"
# calls the real ingest API and needs METRONOME_API_KEY set. Orb is next.
providers:
  stdout:
    type: stdout
    batch:
      max_events: 500
      linger: 10s
    retry:
      max_elapsed: 30m
      max_interval: 2m

  metronome:
    type: metronome
    endpoint: https://api.metronome.com/v1/ingest
    token_env: METRONOME_API_KEY
    batch:
      max_events: 100 # Metronome's hard limit is 100 events/request
      linger: 10s
    retry:
      max_elapsed: 30m # well under Metronome's 34-day dedup window
      max_interval: 2m

routing:
  default: [stdout]
  rules:
    - match: { event_name: "api_call" }
      route: [stdout, metronome]
